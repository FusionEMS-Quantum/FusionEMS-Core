name: CI — Build, Test, Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check backend/ --output-format=github

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          SECRET_KEY: "ci-test-key-not-for-production"
          REDIS_URL: "redis://localhost:6379"
          ENVIRONMENT: "test"
          STRIPE_SECRET_KEY: ""
          AWS_REGION: "us-east-1"
          AWS_DEFAULT_REGION: "us-east-1"
        run: |
          python -m pytest tests/ -v --tb=short --strict-markers

  ci-gates:
    name: Route Matrix Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python scripts/ci_gate_route_matrix.py
      - name: Gate — prohibit crash-on-fallback injections
        run: python scripts/ci_gate_no_frontend_crash_fallbacks.py

  compliance-program:
    name: Compliance Program Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Validate compliance artifacts
        run: python scripts/validate_compliance_program.py
      - name: Upload compliance evidence manifest
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence-manifest
          path: artifacts/compliance-evidence-manifest.json
          if-no-files-found: error

  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install checkov
      - run: checkov -d infra/terraform --config-file checkov.yml --quiet

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type Check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE: "http://localhost:8000"
        run: npm run build

  migration-validate:
    name: Migration Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run migrations to head
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          ENVIRONMENT: "test"
        run: alembic upgrade head
      - name: Verify no pending migrations
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          ENVIRONMENT: "test"
        run: |
          alembic check 2>&1 || {
            echo "ERROR: Alembic detects unapplied model changes."
            echo "Run 'alembic revision --autogenerate -m <msg>' locally."
            exit 1
          }

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Run Tests
        working-directory: frontend
        run: npx vitest run

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t fusionems-${{ matrix.service }}:ci ./${{ matrix.service }}

  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, ci-gates, compliance-program, security-scan, frontend-build, frontend-test, migration-validate, docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "All gates passed — deploy approved"
