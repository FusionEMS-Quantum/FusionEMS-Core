name: Multi-Agent Factory

"on":
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - validate
          - deploy
        default: validate
      allow_apply:
        description: "Allow terraform apply in deploy mode"
        required: false
        type: boolean
        default: false
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  AWS_REGION: "us-east-1"
  AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN || 'arn:aws:iam::793439286972:role/FusionEMS-GHA-TerraformProd' }}

jobs:
  validate-lanes:
    name: Validate Multi-Agent Lanes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Install backend + security dependencies
        run: |
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt
          pip install checkov

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Execute orchestrator (validate)
        run: python scripts/multi_agent_execution.py --mode validate

      - name: Upload multi-agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multi-agent-validate-artifacts
          path: |
            artifacts/multi_agent_execution_report.json
            artifacts/multi-agent-logs/
          if-no-files-found: error

  deploy-lane:
    name: Deploy Lane (Manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'deploy'
    needs: validate-lanes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Execute orchestrator (deploy)
        run: |
          ARGS="--mode deploy"
          if [[ "${{ github.event.inputs.allow_apply }}" == "true" ]]; then
            ARGS="$ARGS --allow-apply"
          fi
          python scripts/multi_agent_execution.py $ARGS

      - name: Upload deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multi-agent-deploy-artifacts
          path: |
            artifacts/multi_agent_execution_report.json
            artifacts/multi-agent-logs/
          if-no-files-found: error

  deployment_summary:
    name: Deployment Summary
    needs: [validate-lanes, deploy-lane]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish deployment result
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const remediationForJob = (job) => {
              const failedSteps = (job.steps || [])
                .filter((step) => step.conclusion === "failure")
                .map((step) => step.name);
              if (failedSteps.some((name) => name.includes("Configure AWS credentials"))) {
                return "OIDC role assumption failed. Verify AWS_OIDC_ROLE_ARN, IAM trust policy subjects, and repository/environment restrictions.";
              }
              if (failedSteps.some((name) => name.includes("Execute orchestrator"))) {
                return "Deployment orchestration failed. Review the uploaded multi-agent logs and report artifact, then correct the failing lane before retrying.";
              }
              if (failedSteps.some((name) => name.includes("Install backend + security dependencies"))) {
                return "Dependency bootstrap failed. Correct package installation or resolver errors before rerunning deploy mode.";
              }
              return "Review the linked job logs and uploaded artifacts to correct the failing deploy lane before retrying.";
            };
            const jobs = [];
            for (let page = 1; ; page += 1) {
              const response = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: runId,
                per_page: 100,
                page,
              });
              jobs.push(...response.data.jobs);
              if (response.data.jobs.length < 100) {
                break;
              }
            }

            const relevantJobs = jobs.filter((job) => job.name !== "Deployment Summary");
            const failedJobs = relevantJobs.filter((job) => job.conclusion === "failure");
            const cancelledJobs = relevantJobs.filter((job) => job.conclusion === "cancelled");
            const skippedJobs = relevantJobs.filter((job) => job.conclusion === "skipped");
            const failed = failedJobs.length > 0 || cancelledJobs.length > 0;

            let summary = `## Multi-Agent Deploy Result\n\n`;
            summary += failed
              ? `❌ **Not successful**\n\n`
              : `✅ **Successful**\n\n`;
            summary += `Run: ${runUrl}\n\n`;

            if (failedJobs.length > 0) {
              summary += `### Failure reasons\n`;
              for (const job of failedJobs) {
                const failedSteps = (job.steps || []).filter((step) => step.conclusion === "failure");
                const stepNames = failedSteps.map((step) => `\`${step.name}\``).join(", ");
                summary += `- **${job.name}** failed`;
                if (stepNames) {
                  summary += ` at ${stepNames}`;
                }
                summary += `. [Job logs](${job.html_url})\n`;
                summary += `  - Auto-remediation guidance: ${remediationForJob(job)}\n`;
              }
              summary += `\n`;
            }

            if (skippedJobs.some((job) => job.name === "Deploy Lane (Manual)")) {
              summary += `### Skipped jobs\n`;
              summary += `- **Deploy Lane (Manual)** skipped because this run was not started in manual deploy mode.\n\n`;
            }

            if (!failed && !skippedJobs.some((job) => job.name === "Deploy Lane (Manual)")) {
              summary += `Validation and deploy lanes completed without failure. Zero-error gate passed for this run.\n`;
            }

            core.summary.addRaw(summary);
            await core.summary.write();
            console.log(summary);
