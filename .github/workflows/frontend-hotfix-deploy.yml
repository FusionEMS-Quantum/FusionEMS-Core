name: Frontend Hotfix Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional explicit image tag"
        required: false
        type: string
  push:
    branches:
      - hotfix/frontend-clean-main-71c0e40

permissions:
  id-token: write
  actions: read
  contents: read

env:
  AWS_REGION: "us-east-1"
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '793439286972' }}
  AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN || 'arn:aws:iam::793439286972:role/FusionEMS-GHA-TerraformProd' }}

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    env:
      ECR_REPO: fusionems-prod-frontend
      ECS_CLUSTER: fusionems-prod-cluster
      ECS_SERVICE: fusionems-prod-frontend
      TASKDEF_FAMILY: fusionems-prod-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: vars
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            TAG="hc-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          fi
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Using image: ${IMAGE_URI}"

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE="https://api.fusionemsquantum.com" \
            --build-arg NEXT_PUBLIC_WS_URL="wss://api.fusionemsquantum.com/api/v1/realtime/ws" \
            --build-arg NEXT_PUBLIC_ROOT_DOMAIN="fusionemsquantum.com" \
            --build-arg NEXT_PUBLIC_BILLING_PHONE="+18883650144" \
            --build-arg NEXT_PUBLIC_CNAM_DISPLAY_NAME="FusionEMS" \
            --build-arg NEXT_PUBLIC_BRAND_NAME="FusionEMS Quantum" \
            --build-arg NEXT_PUBLIC_BRAND_DOMAIN="fusionemsquantum.com" \
            --build-arg NEXT_PUBLIC_BRAND_SUPPORT_EMAIL="billing@fusionemsquantum.com" \
            --build-arg NEXT_PUBLIC_BRAND_NOREPLY_EMAIL="noreply@fusionemsquantum.com" \
            -t "${{ steps.vars.outputs.image_uri }}" \
            ./frontend

      - name: Push frontend image
        run: docker push "${{ steps.vars.outputs.image_uri }}"

      - name: Prepare new task definition
        id: taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition "${TASKDEF_FAMILY}" \
            --query taskDefinition > taskdef.json

          jq --arg IMAGE "${{ steps.vars.outputs.image_uri }}" '
            .containerDefinitions |= map(if .name == "frontend" then .image = $IMAGE else . end)
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' taskdef.json > taskdef-new.json

          NEW_TD_ARN="$(aws ecs register-task-definition --cli-input-json file://taskdef-new.json --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "taskdef_arn=${NEW_TD_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered: ${NEW_TD_ARN}"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.taskdef.outputs.taskdef_arn }}" \
            --force-new-deployment > /dev/null

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Output deployment summary
        run: |
          echo "Deployed image: ${{ steps.vars.outputs.image_uri }}"
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].{taskDefinition:taskDefinition,runningCount:runningCount,pendingCount:pendingCount,status:status,deployments:deployments[*].{status:status,rolloutState:rolloutState,taskDefinition:taskDefinition}}' \
            --output json

  deployment_summary:
    name: Deployment Summary
    needs: [deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish deployment result
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const remediationForJob = (job) => {
              const failedSteps = (job.steps || [])
                .filter((step) => step.conclusion === "failure")
                .map((step) => step.name);
              if (failedSteps.some((name) => name.includes("Configure AWS credentials"))) {
                return "OIDC role assumption failed. Verify AWS_OIDC_ROLE_ARN, IAM trust policy subjects, and GitHub environment restrictions.";
              }
              if (failedSteps.some((name) => name.includes("Build frontend image"))) {
                return "Frontend container build failed. Correct Docker or Next.js build errors before retrying.";
              }
              if (failedSteps.some((name) => name.includes("Push frontend image"))) {
                return "ECR push failed. Verify repository existence, ECR login, and image push permissions.";
              }
              if (failedSteps.some((name) => name.includes("Prepare new task definition"))) {
                return "Task definition registration failed. Verify the ECS task family exists and the rendered task definition is valid.";
              }
              if (
                failedSteps.some((name) => name.includes("Update ECS service")) ||
                failedSteps.some((name) => name.includes("Wait for service stability"))
              ) {
                return "ECS rollout failed. Review ECS service events, task health, and target group health checks before retrying.";
              }
              return "Review the linked job logs for the exact command output and correct the deployment configuration before retrying.";
            };
            const jobs = [];
            let page = 1;
            let hasMore = true;
            while (hasMore) {
              const response = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: runId,
                per_page: 100,
                page,
              });
              jobs.push(...response.data.jobs);
              hasMore = response.data.jobs.length === 100;
              page += 1;
            }

            const relevantJobs = jobs.filter((job) => job.name !== "Deployment Summary");
            const failedJobs = relevantJobs.filter((job) => job.conclusion === "failure");
            const cancelledJobs = relevantJobs.filter((job) => job.conclusion === "cancelled");
            const failed = failedJobs.length > 0 || cancelledJobs.length > 0;

            let summary = `## Frontend Hotfix Deployment Result\n\n`;
            summary += failed
              ? `❌ **Not successful**\n\n`
              : `✅ **Successful**\n\n`;
            summary += `Run: ${runUrl}\n\n`;

            if (failedJobs.length > 0) {
              summary += `### Failure reasons\n`;
              for (const job of failedJobs) {
                const failedSteps = (job.steps || []).filter((step) => step.conclusion === "failure");
                const stepNames = failedSteps.map((step) => `\`${step.name}\``).join(", ");
                summary += `- **${job.name}** failed`;
                if (stepNames) {
                  summary += ` at ${stepNames}`;
                }
                summary += `. [Job logs](${job.html_url})\n`;
                summary += `  - Auto-remediation guidance: ${remediationForJob(job)}\n`;
              }
              summary += `\n`;
            }

            if (cancelledJobs.length > 0) {
              summary += `### Cancelled jobs\n`;
              for (const job of cancelledJobs) {
                summary += `- **${job.name}** was cancelled. [Job logs](${job.html_url})\n`;
              }
              summary += `\n`;
            }

            if (!failed) {
              summary += `Frontend image build, push, task registration, and ECS rollout completed successfully. Zero-error gate passed for this run.\n`;
            }

            core.summary.addRaw(summary);
            await core.summary.write();
            console.log(summary);
