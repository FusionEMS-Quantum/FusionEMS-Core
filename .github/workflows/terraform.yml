name: terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:
    inputs:
      allow_apply:
        description: "Allow terraform apply (manual go-live safety gate)"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: "us-east-1"
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '793439286972' }}
  AWS_OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN || 'arn:aws:iam::793439286972:role/FusionEMS-GHA-TerraformProd' }}
  TF_ROOT_DIR: "infra/terraform"
  TF_WORKING_DIR: "infra/terraform/environments/prod"
  EXPECTED_AWS_ACCOUNT_ID: "793439286972"

jobs:
  fmt_lint_scan:
    name: Terraform Fmt + Lint + Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive ${{ env.TF_ROOT_DIR }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: cd ${{ env.TF_ROOT_DIR }} && tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: cd ${{ env.TF_ROOT_DIR }} && tflint --minimum-failure-severity=error

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d ${{ env.TF_ROOT_DIR }} --config-file checkov.yml --quiet

  validate_envs:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: fmt_lint_scan
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod, dr]

    defaults:
      run:
        shell: bash
        working-directory: infra/terraform/environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init (backend disabled)
        run: |
          set -euo pipefail
          export TF_DATA_DIR="${RUNNER_TEMP}/tfdata-${{ matrix.environment }}"
          mkdir -p "$TF_DATA_DIR"
          terraform init -backend=false

      - name: Terraform validate
        run: |
          set -euo pipefail
          export TF_DATA_DIR="${RUNNER_TEMP}/tfdata-${{ matrix.environment }}"
          mkdir -p "$TF_DATA_DIR"
          terraform validate

  plan_prod:
    name: Plan (prod)
    runs-on: ubuntu-latest
    needs: validate_envs

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS account
        run: |
          set -euo pipefail
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "AWS account: $acct"

          if [[ "$acct" != "${EXPECTED_AWS_ACCOUNT_ID}" ]]; then
            echo "ERROR: Wrong AWS account"
            exit 1
          fi

      - name: Terraform init
        run: terraform init -lock-timeout=10m

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set -euo pipefail
          terraform plan -lock-timeout=10m -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment Terraform plan
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/plan.txt

  apply_prod:
    name: Apply (Protected)
    needs: plan_prod
    runs-on: ubuntu-latest
    environment: prod

    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.allow_apply == true)

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS account
        run: |
          set -euo pipefail
          acct="$(aws sts get-caller-identity --query Account --output text)"

          if [[ "$acct" != "${EXPECTED_AWS_ACCOUNT_ID}" ]]; then
            echo "ERROR: Wrong AWS account"
            exit 1
          fi

      - name: Terraform init
        run: terraform init -lock-timeout=10m

      - name: Terraform apply
        run: terraform apply -auto-approve

  deployment_summary:
    name: Deployment Summary
    needs: [fmt_lint_scan, validate_envs, plan_prod, apply_prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish deployment result
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const remediationForJob = (job) => {
              const failedSteps = (job.steps || [])
                .filter((step) => step.conclusion === "failure")
                .map((step) => step.name);
              if (failedSteps.some((name) => name.includes("Configure AWS credentials"))) {
                return "OIDC role assumption failed. Verify AWS_OIDC_ROLE_ARN, IAM trust policy subjects, and that the GitHub run is permitted to assume the production role.";
              }
              if (failedSteps.some((name) => name.includes("Terraform init"))) {
                return "Terraform backend or provider initialization failed. Verify remote state resources, AWS access, and provider configuration.";
              }
              if (failedSteps.some((name) => name.includes("Terraform validate"))) {
                return "Terraform validation failed. Correct invalid configuration or provider schema usage before retrying.";
              }
              if (failedSteps.some((name) => name.includes("Terraform plan"))) {
                return "Terraform plan failed. Review provider/API errors and infrastructure policy denials in the linked logs before rerunning.";
              }
              if (failedSteps.some((name) => name.includes("Terraform apply"))) {
                return "Terraform apply failed. Correct the infrastructure mutation error in AWS or Terraform configuration before rerunning.";
              }
              return "Review the linked job logs for the exact command output and stack trace, then correct the configuration before retrying.";
            };
            const jobs = [];
            let page = 1;
            let hasMore = true;
            while (hasMore) {
              const response = await github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: runId,
                per_page: 100,
                page,
              });
              jobs.push(...response.data.jobs);
              hasMore = response.data.jobs.length === 100;
              page += 1;
            }

            const relevantJobs = jobs.filter((job) => job.name !== "Deployment Summary");
            const failedJobs = relevantJobs.filter((job) => job.conclusion === "failure");
            const cancelledJobs = relevantJobs.filter((job) => job.conclusion === "cancelled");
            const skippedJobs = relevantJobs.filter((job) => job.conclusion === "skipped");

            const failed = failedJobs.length > 0 || cancelledJobs.length > 0;
            let summary = `## Terraform Deployment Result\n\n`;
            summary += failed
              ? `❌ **Not successful**\n\n`
              : `✅ **Successful**\n\n`;
            summary += `Run: ${runUrl}\n\n`;

            if (failedJobs.length > 0) {
              summary += `### Failure reasons\n`;
              for (const job of failedJobs) {
                const failedSteps = (job.steps || []).filter((step) => step.conclusion === "failure");
                const stepNames = failedSteps.map((step) => `\`${step.name}\``).join(", ");
                summary += `- **${job.name}** failed`;
                if (stepNames) {
                  summary += ` at ${stepNames}`;
                }
                summary += `. [Job logs](${job.html_url})\n`;
                summary += `  - Auto-remediation guidance: ${remediationForJob(job)}\n`;
              }
              summary += `\n`;
            }

            if (cancelledJobs.length > 0) {
              summary += `### Cancelled jobs\n`;
              for (const job of cancelledJobs) {
                summary += `- **${job.name}** was cancelled. [Job logs](${job.html_url})\n`;
              }
              summary += `\n`;
            }

            if (skippedJobs.length > 0) {
              summary += `### Skipped jobs\n`;
              for (const job of skippedJobs) {
                let reason = "workflow conditions were not met";
                if (job.name === "Apply (Protected)") {
                  reason =
                    context.eventName === "pull_request"
                      ? "apply is disabled for pull request runs"
                      : "manual apply was not enabled or environment approval was not reached";
                }
                summary += `- **${job.name}** skipped because ${reason}.\n`;
              }
              summary += `\n`;
            }

            if (!failed) {
              summary += `All required Terraform deployment jobs completed without failure. Zero-error gate passed for this run.\n`;
            }

            core.summary.addRaw(summary);
            await core.summary.write();
            console.log(summary);
