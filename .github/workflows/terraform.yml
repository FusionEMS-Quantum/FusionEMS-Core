name: terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:
    inputs:
      allow_apply:
        description: "Allow terraform apply (manual go-live safety gate)"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: "us-east-1"
  TF_ROOT_DIR: "infra/terraform"
  TF_WORKING_DIR: "infra/terraform/environments/prod"
  EXPECTED_AWS_ACCOUNT_ID: "793439286972"

jobs:
  fmt_lint_scan:
    name: Terraform Fmt + Lint + Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive ${{ env.TF_ROOT_DIR }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Init TFLint
        run: cd ${{ env.TF_ROOT_DIR }} && tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: cd ${{ env.TF_ROOT_DIR }} && tflint --minimum-failure-severity=error

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        run: checkov -d ${{ env.TF_ROOT_DIR }} --config-file checkov.yml --quiet

  validate_envs:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: fmt_lint_scan
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod, dr]

    defaults:
      run:
        shell: bash
        working-directory: infra/terraform/environments/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init (backend disabled)
        run: |
          set -euo pipefail
          export TF_DATA_DIR="${RUNNER_TEMP}/tfdata-${{ matrix.environment }}"
          mkdir -p "$TF_DATA_DIR"
          terraform init -backend=false

      - name: Terraform validate
        run: |
          set -euo pipefail
          export TF_DATA_DIR="${RUNNER_TEMP}/tfdata-${{ matrix.environment }}"
          mkdir -p "$TF_DATA_DIR"
          terraform validate

  plan_prod:
    name: Plan (prod)
    runs-on: ubuntu-latest
    needs: validate_envs

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::793439286972:role/GitHubTerraformRole
          aws-region: us-east-1

      - name: Verify AWS account
        run: |
          set -euo pipefail
          acct="$(aws sts get-caller-identity --query Account --output text)"
          echo "AWS account: $acct"

          if [[ "$acct" != "${EXPECTED_AWS_ACCOUNT_ID}" ]]; then
            echo "ERROR: Wrong AWS account"
            exit 1
          fi

      - name: Terraform init
        run: terraform init -lock-timeout=10m

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set -euo pipefail
          terraform plan -lock-timeout=10m -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment Terraform plan
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/plan.txt

  apply_prod:
    name: Apply (Protected)
    needs: plan_prod
    runs-on: ubuntu-latest

    # First production launches should be manual from a trusted operator environment.
    # Enable apply only via explicit manual dispatch.
    if: github.event_name == 'workflow_dispatch' && inputs.allow_apply == 'true'

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::793439286972:role/GitHubTerraformRole
          aws-region: us-east-1

      - name: Verify AWS account
        run: |
          set -euo pipefail
          acct="$(aws sts get-caller-identity --query Account --output text)"

          if [[ "$acct" != "${EXPECTED_AWS_ACCOUNT_ID}" ]]; then
            echo "ERROR: Wrong AWS account"
            exit 1
          fi

      - name: Terraform init
        run: terraform init -lock-timeout=10m

      - name: Terraform apply
        run: terraform apply -auto-approve
