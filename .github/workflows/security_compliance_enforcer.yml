name: Security & Compliance Enforcer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Daily scan

jobs:
  iac-security:
    name: Terraform Checkov & TFLint Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Run Checkov (Compliance Checks)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform/
          framework: terraform
          # Blocking on High/Critical compliance failures (HIPAA/SOC2)
          soft_fail: false 
          output_format: cli

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: v0.48.0

      - name: Run TFLint
        run: |
          
          # authenticate to github to avoid rate limiting
          export GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tflint --init
          cd infra/terraform/ && tflint --recursive --minimum-failure-severity=warning

  container-scanning:
    name: Trivy Container Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build local container image
        run: docker build -t fusionems/backend:latest ./backend
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fusionems/backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  python-security:
    name: Backend Bandit / Safety Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install security tools
        run: pip install bandit safety
      - name: Run Bandit
        run: bandit -r backend/ -ll -ii -x backend/tests/
      - name: Run Safety
        run: safety check -r backend/requirements.txt
