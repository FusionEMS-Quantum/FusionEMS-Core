<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
    </style>
</head>
<body>

    <div class="flex items-center gap-4">
      <!-- Precision Geometric Monogram -->
      <div class="relative flex items-center justify-center w-12 h-12 bg-white/5 border border-white/10 overflow-hidden shadow-lg">
        <div class="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent"></div>
        <span class="text-2xl font-black italic tracking-tighter text-white z-10 mr-1">F</span>
        <span class="text-2xl font-black italic tracking-tighter text-gray-400 z-10">Q</span>
        <!-- Cyber slash -->
        <div class="absolute top-0 left-0 w-full h-full bg-[linear-gradient(55deg,transparent_45%,#ff6600_48%,#ff6600_52%,transparent_55%)] z-20 shadow-[0_0_10px_#ff6600]"></div>
      </div>
      
      <!-- High-Authority Wordmark -->
      <div class="flex flex-col justify-center">
        <div class="flex items-baseline mb-1">
          <span class="text-xl font-black tracking-[0.2em] text-white uppercase leading-none">
            FUSIONEMS
          </span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-6 h-[1px] bg-[#ff6600]/80"></div>
          <span class="text-[0.65rem] font-bold tracking-[0.4em] text-[#ff6600] uppercase leading-none">
            Quantum
          </span>
          <div class="w-6 h-[1px] bg-[#ff6600]/80"></div>
        </div>
      </div>
    </div>

</body>
</html>
