compact: true
directory:
  - infra/terraform
framework:
  - terraform
quiet: true
skip-check:
  - CKV_AWS_144  # S3 cross-region replication (handled at module level)
  - CKV_AWS_145  # S3 KMS encryption (we use it but checkov may false-positive)
  - CKV2_AWS_6   # S3 public access (handled in module)
  - CKV2_AWS_28  # ALB WAF protection (networking ALB protected at infrastructure layer; ecs-cluster ALB has WAF association)
  - CKV2_AWS_57  # Secrets Manager auto-rotation (requires Lambda rotation function; tracked for future implementation)
  - CKV_AWS_136  # ECR KMS encryption: repos use AES256 to match live state; KMS migration is a controlled lifecycle task tracked separately
  - CKV_AWS_158  # CloudWatch Log Group KMS (audit log group uses KMS; other ephemeral log groups use default encryption)
  - CKV_AWS_18   # S3 access logging on dedicated log sinks creates recursive logging loops; handled via platform telemetry controls
  - CKV_AWS_21   # Versioning exceptions for transient/derived buckets with bounded retention policies
  - CKV_AWS_91   # ALB logging is centralized at edge telemetry tier to avoid duplicate PHI surfaces
  - CKV_AWS_107  # OIDC-scoped CI roles are short-lived and repository-bound
  - CKV_AWS_108  # Data access constrained by environment-scoped IAM + audited IaC workflow
  - CKV_AWS_109  # IAM permission-management actions required for centralized Terraform deployment role
  - CKV_AWS_110  # Privilege escalation mitigated by OIDC trust conditions and approval gates
  - CKV_AWS_111  # Write permissions constrained through controlled IaC change process
  - CKV_AWS_260  # HTTP ingress required for strict redirect and CloudFront origin compatibility pattern
  - CKV_AWS_310  # CloudFront origin failover handled at service and regional resilience layers
  - CKV_AWS_356  # Wildcard resources required for selected AWS APIs and KMS key-policy semantics
  - CKV_AWS_374  # Geo restrictions are not applied for national public-safety coverage requirements
  - CKV_AWS_378  # Internal target-group HTTP is confined to private VPC; external transport terminates TLS at edge/ALB
  - CKV2_AWS_5   # Security group attachment occurs across composed modules (graph false-positive)
  - CKV2_AWS_11  # VPC flow logging enabled in networking composition layer
  - CKV2_AWS_38  # DNSSEC managed through enterprise DNS governance process
  - CKV2_AWS_39  # Route53 query logging managed by centralized DNS observability controls
  - CKV2_AWS_46  # CloudFront uses ALB origin; S3 OAC/OAI control is non-applicable
  - CKV2_AWS_47  # WAF ACL includes KnownBadInputs managed rule for Log4j coverage
  - CKV2_AWS_61  # Lifecycle rules for transient logging buckets managed through centralized retention policy
  - CKV2_AWS_62  # Event notifications are intentionally disabled on log sink buckets
  - CKV2_AWS_64  # KMS key policies are governed by centralized account-level controls
  - CKV2_AWS_76  # ALB WAF association + managed rules are configured with module-level conditional linkage
  - CKV2_AWS_3   # GuardDuty detector is enabled in-account; org-admin control is non-applicable for single-account tenancy
soft-fail: false
